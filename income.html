<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Income Statement | Accounting Statements Game</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="home.html" class="brand">Accounting Statements Game</a>
      <nav class="nav">
        <a href="home.html">Home</a>
        <a href="income.html" class="active">Income</a>
        <a href="balance.html">Balance</a>
        <a href="cashflow.html">Cash Flow</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="page-intro">
      <h1>Income Statement</h1>
      <p>Focus on revenue, expenses, and net income. This page can become your first playable quiz.</p>
    </section>

    <section class="card">
      <h2>Mini Statement</h2>
      <div class="statement-box">
        <div class="statement-line"><span>Revenue</span><span>$2,000</span></div>
        <div class="statement-line"><span>Expenses</span><span>$1,200</span></div>
        <div class="statement-line"><strong>Net Income</strong><strong>$800</strong></div>
      </div>

      <div class="quiz-area">
        <h3>Practice Prompt</h3>
        <p>The company pays $150 for rent. What happens?</p>

        <div class="options">
          <button class="option-btn">Revenue increases</button>
          <button class="option-btn">Expense increases</button>
          <button class="option-btn">No effect</button>
        </div>
      </div>
    </section>
  </main>

  <div class="footer-space"></div>
</body>
</html>
