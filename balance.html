<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Balance Sheet | Accounting Statements Game</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="home.html" class="brand">Accounting Statements Game</a>
      <nav class="nav">
        <a href="home.html">Home</a>
        <a href="income.html">Income</a>
        <a href="balance.html" class="active">Balance</a>
        <a href="cashflow.html">Cash Flow</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="page-intro">
      <h1>Balance Sheet</h1>
      <p>Learn the accounting equation: Assets = Liabilities + Equity.</p>
    </section>

    <section class="card">
      <h2>Mini Balance Sheet</h2>
      <div class="statement-box">
        <div class="statement-line"><span>Cash</span><span>$1,000</span></div>
        <div class="statement-line"><span>Inventory</span><span>$500</span></div>
        <div class="statement-line"><strong>Total Assets</strong><strong>$1,500</strong></div>
        <div class="statement-line"><span>Debt</span><span>$600</span></div>
        <div class="statement-line"><span>Equity</span><span>$900</span></div>
      </div>

      <div class="quiz-area">
        <h3>Practice Prompt</h3>
        <p>The company takes out a $400 bank loan. Which areas change?</p>

        <div class="options">
          <button class="option-btn">Assets and Liabilities</button>
          <button class="option-btn">Assets and Equity</button>
          <button class="option-btn">Liabilities and Equity</button>
        </div>
      </div>
    </section>
  </main>

  <div class="footer-space"></div>
</body>
</html>
